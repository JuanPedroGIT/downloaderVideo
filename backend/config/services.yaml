parameters:
    downloader.formats:
        mp3: "-x --audio-format mp3 --audio-quality 0"
        mp4: "-f \"bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best\""
        webm: "-f \"bestvideo[ext=webm]+bestaudio[ext=webm]/best[ext=webm]/best\""
        audio: "-x --audio-format best --audio-quality 0"
        video: "-f \"bestvideo\""
    downloader.allowed_hosts:
        - youtube.com
        - www.youtube.com
        - youtu.be
        - m.youtube.com
        - music.youtube.com
    redis_url: '%env(REDIS_URL)%'
    jwt_secret: '%env(JWT_SECRET)%'
    brevo_api_key: '%env(BREVO_API_KEY)%'
    default_uri: '%env(DEFAULT_URI)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Download/ValueObject/DownloadFormat.php'
            - '../src/Kernel.php'

    # ── Redis client ──────────────────────────────────────────────────────────
    Predis\Client:
        arguments:
            $parameters: '%redis_url%'

    # ── Job repository ────────────────────────────────────────────────────────
    App\Infrastructure\Repository\JobRepositoryInterface:
        alias: App\Infrastructure\Repository\RedisJobRepository

    # ── User repository ───────────────────────────────────────────────────────
    App\Domain\Auth\Repository\AdminUserRepositoryInterface:
        alias: App\Infrastructure\Repository\DoctrineAdminUserRepository

    # ── QrCode repository ─────────────────────────────────────────────────────
    App\Domain\QrCode\Repository\QrCodeRepositoryInterface:
        alias: App\Infrastructure\Repository\DoctrineQrCodeRepository

    # ── JWT ───────────────────────────────────────────────────────────────────
    App\Infrastructure\Security\JwtServiceInterface:
        alias: App\Infrastructure\Security\JwtService

    App\Infrastructure\Security\JwtService:
        arguments:
            $secret: '%jwt_secret%'

    # ── Email ─────────────────────────────────────────────────────────────────
    App\Infrastructure\Email\MailerInterface:
        alias: App\Infrastructure\Email\BrevoMailer

    App\Infrastructure\Email\BrevoMailer:
        arguments:
            $brevoApiKey: '%brevo_api_key%'

    # ── Auth handlers ─────────────────────────────────────────────────────────
    App\Application\Auth\Register\RegisterUserHandler:
        arguments:
            $defaultUri: '%default_uri%'

    App\Application\Auth\RequestPasswordReset\RequestPasswordResetHandler:
        arguments:
            $defaultUri: '%default_uri%'

    # ── Downloader ────────────────────────────────────────────────────────────
    App\Service\DownloaderService:
        arguments:
            $formats: '%downloader.formats%'
            $allowedHosts: '%downloader.allowed_hosts%'
            $providers: !tagged_iterator app.video_provider
