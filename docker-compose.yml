services:
  # --- Backend (Symfony 7 API) ---
  yt-downloader-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yt-downloader-backend
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_SECRET: "${APP_SECRET}"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1|.*\\.media-tools\\.me|media-tools\\.me)(:[0-9]+)?$"
      MESSENGER_TRANSPORT_DSN: "redis://shared-redis:6379/0"
      REDIS_URL: "redis://shared-redis:6379"
      DATABASE_URL: "postgresql://mediatools:${MEDIATOOLS_DB_PASS}@shared-postgres-db:5432/mediatools?serverVersion=16&charset=utf8"
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003 idekey=VSCODE start_with_request=yes log=/tmp/xdebug.log"
      PHP_IDE_CONFIG: "serverName=yt-downloader-backend"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shared-network
    volumes:
      - tmp_downloads:/tmp
      - ./backend:/app
    # Quitamos el depends_on para evitar bloqueos en local

  # --- Worker ---
  yt-downloader-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yt-downloader-worker
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "-vv"]
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://mediatools:${MEDIATOOLS_DB_PASS}@shared-postgres-db:5432/mediatools?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "redis://shared-redis:6379/0"
    volumes:
      - tmp_downloads:/tmp
    networks:
      - shared-network

  # --- Frontend (Vue 3) ---
  yt-downloader-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yt-downloader-frontend
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: "http://yt-downloader-backend:8080"
    networks:
      - shared-network

volumes:
  tmp_downloads:

networks:
  shared-network:
    name: shared-network
    external: true