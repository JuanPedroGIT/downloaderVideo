services:
  # --- Backend (Symfony 7 API) ---
  yt-downloader-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yt-downloader-backend
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_SECRET: "${APP_SECRET}"
      # CORS: Permitimos el dominio real y localhost para pruebas
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1|.*\\.media-tools\\.me|media-tools\\.me)(:[0-9]+)?$"
      # Conexión al Redis de Infra
      MESSENGER_TRANSPORT_DSN: "redis://shared-redis:6379/0"
      REDIS_URL: "redis://shared-redis:6379"
      # Conexión al Postgres de Infra
      DATABASE_URL: "postgresql://mediatools:${MEDIATOOLS_DB_PASS}@shared-postgres-db:5432/mediatools?serverVersion=16&charset=utf8"
    networks:
      - shared-network
    volumes:
      - tmp_downloads:/tmp
      - ./backend/public/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
    depends_on:
      - postgres

  # --- Worker (Procesador de colas en segundo plano) ---
  yt-downloader-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yt-downloader-worker
    restart: unless-stopped
    command: ["php", "bin/console", "messenger:consume", "async", "-vv"]
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://mediatools:${MEDIATOOLS_DB_PASS}@shared-postgres-db:5432/mediatools?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "redis://shared-redis:6379/0"
    volumes:
      - tmp_downloads:/tmp
    networks:
      - shared-network

  # --- Frontend (Vue 3) ---
  yt-downloader-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yt-downloader-frontend
    restart: unless-stopped
    environment:
      # - PORT=80
      # El frontend habla con la API a través del Nginx de Infra
      BACKEND_UPSTREAM: "http://yt-downloader-backend:8080"
    networks:
      - shared-network
    depends_on:
      yt-downloader-backend:
        condition: service_healthy

  # Placeholder para mantener compatibilidad de red
  postgres:
    image: alpine:latest
    command: echo "Using shared PostgreSQL"
    networks:
      - shared-network
    deploy:
      replicas: 0

volumes:
  tmp_downloads:

networks:
  shared-network:
    name: shared-network
    external: true